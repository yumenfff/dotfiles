[general]
import = [
    "~/.config/alacritty/themes/themes/custom.toml"
]

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"
LANG = "en_US.UTF-8"

[font]
size = 18

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[cursor.style]
shape = "Beam"
blinking = "Off"

[window]
decorations = "Buttonless"
dynamic_padding = true
opacity = 0.4
blur = true 
#startup_mode = "Maximized"
startup_mode = "Windowed"
dimensions = { columns = 100, lines = 30 }

[window.position]
x = 400
y = 100

[window.padding]
x = 15
y = 15
